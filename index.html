<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Internship Portal | IPO Validated</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f111a;
            padding: 20px;
        }

        .portal-card {
            width: 1100px;
            display: flex;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Form Side (unchanged) */
        .form-section {
            width: 55%;
            padding: 50px 40px;
            color: #ffffff;
        }

        h2 {
            font-size: 34px;
            margin-bottom: 20px;
            color: #87CEEB;
            font-weight: 700;
        }

        .ipo-badge {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            font-size: 10px;
            font-weight: 500;
            color: #87CEEB;
            border-bottom: 1px solid rgba(135, 206, 235, 0.3);
            padding-bottom: 10px;
        }
        .ipo-badge span {
            background: rgba(135, 206, 235, 0.1);
            padding: 4px 12px;
            border-radius: 30px;
        }

        .section-tag {
            font-size: 13px;
            color: #87CEEB;
            margin: 20px 0 15px;
            display: block;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            font-size: 11px;
            margin-bottom: 8px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #87CEEB;
            box-shadow: 0 0 0 3px rgba(135, 206, 235, 0.2);
        }

        .valid {
            border-color: #87CEEB !important;
            background: rgba(135, 206, 235, 0.1);
        }
        .invalid {
            border-color: #ff6b6b !important;
        }
        .error-msg {
            font-size: 10px;
            color: #ff8888;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 8px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #ddd;
        }
        .radio-item input {
            width: 16px;
            height: 16px;
            accent-color: #87CEEB;
        }

        .strength {
            font-size: 10px;
            margin-top: 5px;
        }
        .weak { color: #ff8888; }
        .medium { color: #ffcc66; }
        .strong { color: #87CEEB; }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            background: none;
            border: none;
            color: #87CEEB;
            font-size: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #87CEEB;
            border: none;
            border-radius: 15px;
            color: #0f111a;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s ease;
            margin-top: 15px;
        }
        .submit-btn:hover {
            background: #70c1e3;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(135, 206, 235, 0.4);
        }

        .output-area {
            margin-top: 20px;
            padding: 12px;
            background: rgba(135, 206, 235, 0.1);
            border-radius: 14px;
            text-align: center;
            font-size: 12px;
            color: #ccf;
            border-left: 3px solid #87CEEB;
        }

        /* ----- Right Side: Custom Text Design (Light Blue + Purple) ----- */
        .brand-section {
            width: 45%;
            background: linear-gradient(145deg, #0a1a2f, #1e1a3a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .internship-card {
            width: 100%;
            background: rgba(135, 206, 235, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(135, 206, 235, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .internship-card:hover {
            transform: scale(1.02);
            border-color: #a855f7;
        }
        .open-text {
            font-size: 18px;
            letter-spacing: 3px;
            color: #a0c4ff;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .internship-title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #87CEEB, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }
        .option-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(135,206,235,0.3);
            border-radius: 40px;
            padding: 10px 8px;
            font-size: 13px;
            font-weight: 600;
            color: #bae6fd;
            transition: 0.2s;
        }
        .option-item:hover {
            background: rgba(135,206,235,0.2);
            border-color: #a855f7;
            color: white;
        }
        .apply-btn {
            background: linear-gradient(90deg, #87CEEB, #a855f7);
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            width: 80%;
            font-weight: 800;
            font-size: 18px;
            color: #0f111a;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(135,206,235,0.3);
        }
        .apply-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 15px 30px rgba(168,85,247,0.4);
        }
        @media (max-width: 850px) {
            .portal-card { flex-direction: column; width: 100%; }
            .form-section, .brand-section { width: 100%; }
            .form-section { padding: 30px; }
            .brand-section { padding: 30px; }
            .internship-title { font-size: 36px; }
        }
    </style>
</head>
<body>

<div class="portal-card">
    <!-- Left: Form Section (same as before) -->
    <div class="form-section">
        <h2>Internship Portal</h2>
        <div class="ipo-badge">
            <span>📥 INPUT (Semantic)</span>
            <span>⚙️ PROCESS (JS + RegEx)</span>
            <span>📢 OUTPUT (Dynamic UI)</span>
        </div>

        <form id="internForm" novalidate>
            <div class="form-grid">
                <div class="input-box">
                    <label>Full Name *</label>
                    <input type="text" id="fullname" placeholder="John Doe">
                    <div class="error-msg" id="nameError"></div>
                </div>
                <div class="input-box">
                    <label>Age</label>
                    <input type="number" id="age" placeholder="21">
                    <div class="error-msg" id="ageError"></div>
                </div>
            </div>

            <div class="input-box" style="margin-bottom: 20px;">
                <label>Gender</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="gender" value="Male" checked> Male</label>
                    <label class="radio-item"><input type="radio" name="gender" value="Female"> Female</label>
                </div>
            </div>

            <span class="section-tag">Personal Information</span>

            <div class="form-grid">
                <div class="input-box">
                    <label>Email Address *</label>
                    <input type="email" id="email" placeholder="example@company.com">
                    <div class="error-msg" id="emailError"></div>
                </div>
                <div class="input-box">
                    <label>Phone Number (digits only)</label>
                    <input type="tel" id="phone" placeholder="03001234567">
                    <div class="error-msg" id="phoneError"></div>
                </div>
            </div>

            <div class="form-grid">
                <div class="input-box">
                    <label>Current Status</label>
                    <select id="status">
                        <option>Student</option>
                        <option>Graduate</option>
                        <option>Professional</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>Institute Name</label>
                    <input type="text" id="institute" placeholder="University Name">
                </div>
            </div>

            <span class="section-tag">Security Credentials</span>
            <div class="form-grid">
                <div class="input-box" style="position: relative;">
                    <label>Password * (min 6 chars)</label>
                    <input type="password" id="password" placeholder="Create password">
                    <button type="button" class="eye-icon" id="togglePwd">👁️</button>
                    <div class="error-msg" id="passwordError"></div>
                    <div class="strength" id="strengthMsg"></div>
                </div>
                <div class="input-box">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPwd" placeholder="Re-enter password">
                    <div class="error-msg" id="confirmError"></div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>

        <div class="output-area" id="outputMessage" role="status" aria-live="polite">
            ✨ IPO validation active — fill correctly
        </div>
    </div>

    <!-- Right Side: Custom Text Design (Light Blue + Purple) -->
    <div class="brand-section">
        <div class="internship-card">
            <div class="open-text">WE ARE OPEN FOR</div>
            <div class="internship-title">INTERNSHIP</div>
            <div class="options-grid">
                <div class="option-item">🎯 INTERN</div>
                <div class="option-item">📈 MARKETING</div>
                <div class="option-item">📱 SOCIAL MEDIA</div>
                <div class="option-item">✍️ CONTENT CREATION</div>
            </div>
            <button class="apply-btn" onclick="alert('Start your application on the left form!')">APPLY NOW →</button>
        </div>
    </div>
</div>

<script>
    // DOM elements (same as previous working validation)
    const fullname = document.getElementById('fullname');
    const age = document.getElementById('age');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    const password = document.getElementById('password');
    const confirmPwd = document.getElementById('confirmPwd');
    const institute = document.getElementById('institute');
    const statusSel = document.getElementById('status');

    const nameErr = document.getElementById('nameError');
    const ageErr = document.getElementById('ageError');
    const emailErr = document.getElementById('emailError');
    const phoneErr = document.getElementById('phoneError');
    const pwdErr = document.getElementById('passwordError');
    const confirmErr = document.getElementById('confirmError');
    const strengthMsg = document.getElementById('strengthMsg');
    const outputMsg = document.getElementById('outputMessage');

    function setStyle(field, valid) {
        if (valid) { field.classList.add('valid'); field.classList.remove('invalid'); }
        else { field.classList.add('invalid'); field.classList.remove('valid'); }
    }

    function validateName() {
        let val = fullname.value.trim();
        let valid = true;
        let msg = '';
        if (val === '') { msg = 'Full name required'; valid = false; }
        else if (val.length < 2) { msg = 'Minimum 2 characters'; valid = false; }
        nameErr.textContent = msg;
        setStyle(fullname, valid);
        return valid;
    }
    function validateAge() {
        let val = age.value.trim();
        let valid = true;
        let msg = '';
        if (val !== '' && (isNaN(val) || val < 18 || val > 65)) { msg = 'Age must be 18-65'; valid = false; }
        ageErr.textContent = msg;
        setStyle(age, valid);
        return valid;
    }
    function validateEmail() {
        let val = email.value.trim();
        let re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        let valid = true;
        let msg = '';
        if (val === '') { msg = 'Email required'; valid = false; }
        else if (!re.test(val)) { msg = 'Invalid email format'; valid = false; }
        emailErr.textContent = msg;
        setStyle(email, valid);
        return valid;
    }
    function validatePhone() {
        let val = phone.value.trim();
        let valid = true;
        let msg = '';
        if (val !== '' && !/^\d+$/.test(val)) { msg = 'Only digits allowed'; valid = false; }
        phoneErr.textContent = msg;
        setStyle(phone, valid);
        return valid;
    }
    function validatePassword() {
        let val = password.value;
        let valid = true;
        let msg = '';
        if (val === '') { msg = 'Password required'; valid = false; }
        else if (val.length < 6) { msg = 'Minimum 6 characters'; valid = false; }
        pwdErr.textContent = msg;
        setStyle(password, valid);
        if (val.length >= 8 && /[A-Za-z]/.test(val) && /\d/.test(val) && /[!@#$%^&*]/.test(val))
            strengthMsg.innerHTML = '<span class="strong">✅ Strong password</span>';
        else if (val.length >= 6 && /[A-Za-z]/.test(val) && /\d/.test(val))
            strengthMsg.innerHTML = '<span class="medium">🔶 Medium (add special char)</span>';
        else if (val.length > 0)
            strengthMsg.innerHTML = '<span class="weak">⚠️ Weak (letters+numbers recommended)</span>';
        else strengthMsg.innerHTML = '';
        return valid;
    }
    function validateConfirm() {
        let pwd = password.value;
        let conf = confirmPwd.value;
        let valid = true;
        let msg = '';
        if (conf === '' && pwd !== '') { msg = 'Confirm password'; valid = false; }
        else if (conf !== pwd) { msg = 'Passwords do not match'; valid = false; }
        confirmErr.textContent = msg;
        setStyle(confirmPwd, valid);
        return valid;
    }

    fullname.addEventListener('input', () => { validateName(); saveToLocal(); });
    age.addEventListener('input', () => { validateAge(); saveToLocal(); });
    email.addEventListener('input', () => { validateEmail(); saveToLocal(); });
    phone.addEventListener('input', function() { this.value = this.value.replace(/[^0-9]/g, ''); validatePhone(); saveToLocal(); });
    password.addEventListener('input', () => { validatePassword(); validateConfirm(); saveToLocal(); });
    confirmPwd.addEventListener('input', () => { validateConfirm(); saveToLocal(); });
    institute.addEventListener('input', saveToLocal);
    statusSel.addEventListener('change', saveToLocal);
    document.querySelectorAll('input[name="gender"]').forEach(r => r.addEventListener('change', saveToLocal));

    document.getElementById('togglePwd').addEventListener('click', () => {
        let type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
    });

    function saveToLocal() {
        const data = {
            fullname: fullname.value,
            age: age.value,
            gender: document.querySelector('input[name="gender"]:checked').value,
            status: statusSel.value,
            institute: institute.value,
            email: email.value,
            phone: phone.value,
            password: password.value,
            confirmPwd: confirmPwd.value
        };
        localStorage.setItem('internshipFormData', JSON.stringify(data));
    }
    function loadFromLocal() {
        const saved = localStorage.getItem('internshipFormData');
        if (saved) {
            try {
                let d = JSON.parse(saved);
                fullname.value = d.fullname || '';
                age.value = d.age || '';
                if (d.gender) document.querySelector(`input[name="gender"][value="${d.gender}"]`).checked = true;
                statusSel.value = d.status || 'Student';
                institute.value = d.institute || '';
                email.value = d.email || '';
                phone.value = d.phone || '';
                password.value = d.password || '';
                confirmPwd.value = d.confirmPwd || '';
                validateName(); validateAge(); validateEmail(); validatePhone(); validatePassword(); validateConfirm();
            } catch(e) {}
        }
    }
    window.addEventListener('load', loadFromLocal);

    const form = document.getElementById('internForm');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const isNameValid = validateName();
        const isAgeValid = validateAge();
        const isEmailValid = validateEmail();
        const isPhoneValid = validatePhone();
        const isPwdValid = validatePassword();
        const isConfirmValid = validateConfirm();

        if (isNameValid && isAgeValid && isEmailValid && isPhoneValid && isPwdValid && isConfirmValid) {
            alert('✅ Application Submitted Successfully! (IPO Validated)');
            outputMsg.innerHTML = '🎉 Thank you! Your internship application has been recorded. Data saved locally.';
        } else {
            outputMsg.innerHTML = '❌ Please fix all errors (red fields) before submitting.';
        }
    });
</script>
</body>
</html>
